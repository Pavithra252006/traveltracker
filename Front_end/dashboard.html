<!DOCTYPE html>
<html>
<head>
    <title>Travel Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌍 Travel Tracker</h1>

    <input type="text" id="tripInput" placeholder="Enter Trip Name">
    <button onclick="addTrip()">Add Trip</button>

    <br><br>

    <input type="text"
           id="searchInput"
           placeholder="Search Trip"
           onkeyup="searchTrip()">
<table class="trip-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Trip Name</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="tripTable"></tbody>
</table>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
